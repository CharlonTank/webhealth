     it lands in <body>, before Lamdera's <script> tag. Crawlers that don't
     execute JS (most AI / RSS / link-previewers) read the <noscript>
     fallback. JS-enabled clients see Elm's hydrated UI as usual. -->

<noscript>

  <main>
    <h2>How healthy is your website?</h2>
    <p>Audit any URL - pre-launch or live - for technical, SEO, and accessibility issues. Server-side static analysis driven from Elm, no headless browser.</p>

    <h2>What it checks</h2>
    <p>Rendering architecture (SSG / bot-aware SSR / CSR), title and meta tags, canonical, favicon, viewport, html lang, h1 and heading hierarchy, image alt text, HTTPS and HSTS, security headers, CSP quality, cookie security, server-version disclosure, perceived load time, render-blocking resources, compression, robots.txt, sitemap, crawl directives, form labels, landmarks, Open Graph and Twitter cards, JSON-LD, PWA metadata, internal and external link health.</p>

    <h2>Run from CLI, Claude, or any agent</h2>
    <p>POST <code>https://webhealth.lamdera.app/_r/audit</code> with a JSON body <code>{"url":"&lt;your-site&gt;"}</code>. Poll the same endpoint until <code>status</code> is <code>"ready"</code>, then read <code>report</code>.</p>
    <pre>curl -X POST https://webhealth.lamdera.app/_r/audit \
  -H "Content-Type: application/json" \
  -d '{"url":"https://your-site.com"}'</pre>
    <p>JSON response. No auth, no API key.</p>
  </main>
